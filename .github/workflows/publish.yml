name: Publish

# Triggers:
#   1. Push to main (PR merge) — auto-publishes if the version in
#      pyproject.toml is not already on PyPI.
#   2. Manual dispatch — choose "testpypi" for a dry-run or "pypi" for
#      a real release without needing a branch push.
on:
  push:
    branches: [main]
    paths:
      - "pyproject.toml"
      - "lightweight_charts/**"
  workflow_dispatch:
    inputs:
      repository:
        description: "Target repository"
        required: true
        default: "testpypi"
        type: choice
        options:
          - testpypi
          - pypi

permissions:
  contents: read

jobs:
  version-check:
    name: version-check
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
      should_publish: ${{ steps.check-pypi.outputs.should_publish }}
      repository: ${{ steps.set-repo.outputs.repository }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Get version from pyproject.toml
        id: get-version
        run: |
          VERSION=$(python -c "import tomllib; d=tomllib.load(open('pyproject.toml','rb')); print(d['project']['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version from pyproject.toml: $VERSION"

      - name: Verify pyproject.toml and __version__ match
        run: |
          uv sync
          INIT_VER=$(uv run python -c "import lightweight_charts; print(lightweight_charts.__version__)")
          TOML_VER="${{ steps.get-version.outputs.version }}"
          echo "pyproject.toml: $TOML_VER"
          echo "__version__:    $INIT_VER"
          if [ "$TOML_VER" != "$INIT_VER" ]; then
            echo "ERROR: pyproject.toml version ($TOML_VER) != __version__ ($INIT_VER)"
            exit 1
          fi

      - name: Determine target repository
        id: set-repo
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "repository=${{ github.event.inputs.repository }}" >> "$GITHUB_OUTPUT"
          else
            echo "repository=pypi" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if version already exists on target
        id: check-pypi
        run: |
          VERSION="${{ steps.get-version.outputs.version }}"
          REPO="${{ steps.set-repo.outputs.repository }}"
          if [ "$REPO" = "testpypi" ]; then
            INDEX_URL="https://test.pypi.org/pypi/python-lightweight-charts/json"
          else
            INDEX_URL="https://pypi.org/pypi/python-lightweight-charts/json"
          fi
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$INDEX_URL")
          if [ "$HTTP_STATUS" = "200" ]; then
            EXISTS=$(curl -s "$INDEX_URL" | python -c "
          import sys, json
          data = json.load(sys.stdin)
          releases = data.get('releases', {})
          print('true' if '$VERSION' in releases else 'false')
          ")
            echo "Version $VERSION exists on $REPO: $EXISTS"
            if [ "$EXISTS" = "true" ]; then
              echo "should_publish=false" >> "$GITHUB_OUTPUT"
            else
              echo "should_publish=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "Package not found on $REPO (HTTP $HTTP_STATUS) — will publish"
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: build
    needs: version-check
    if: needs.version-check.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build wheel and sdist
        run: uv build

      - name: Verify bundle.js is present in wheel
        run: |
          python -c "
          import zipfile, glob, sys
          whl = glob.glob('dist/*.whl')[0]
          names = zipfile.ZipFile(whl).namelist()
          assert any('js/bundle.js' in n for n in names), 'bundle.js missing from wheel!'
          print('bundle.js present:', [n for n in names if 'bundle.js' in n])
          "

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: publish to ${{ needs.version-check.outputs.repository }}
    needs: [version-check, build]
    if: needs.version-check.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    environment: ${{ needs.version-check.outputs.repository == 'testpypi' && 'testpypi' || 'release' }}
    permissions:
      id-token: write  # required for OIDC Trusted Publisher
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        if: needs.version-check.outputs.repository == 'pypi'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true

      - name: Publish to TestPyPI
        if: needs.version-check.outputs.repository == 'testpypi'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://upload.test.pypi.org/legacy/
          attestations: false
