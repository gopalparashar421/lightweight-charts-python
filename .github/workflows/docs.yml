name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "lightweight_charts/**"
      - ".readthedocs.yaml"
  pull_request:
    branches: [main]
    paths:
      - "docs/**"
      - "lightweight_charts/**"
      - ".readthedocs.yaml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-docs:
    name: build docs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package and docs dependencies
        run: uv sync --group docs

      - name: Build Sphinx docs (warnings as errors)
        run: |
          uv run sphinx-build -W --keep-going -b html docs/source docs/_build/html

      - name: Upload docs artifact (for PR preview)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: docs-preview-${{ github.event.pull_request.number }}
          path: docs/_build/html
          retention-days: 7
